<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drott</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Left panel: controls -->
    <div id="sidebar">
      <div class="sidebar-head">
        <h1 class="title">DROTT</h1>
        <p class="subtitle">A Norse Strategy Game</p>
        <p class="version-label">v0.214</p>
      </div>

      <div class="section">
        <div class="player-row">
          <span class="player-label red-label">Red</span>
          <select id="red-kind" onchange="onPlayerChange('red')">
            <option value="human">Human</option>
            <option value="herringbone">Herringbone</option>
            <option value="astrid">Astrid</option>
          </select>
        </div>
        <div id="red-options" class="player-options" style="display:none"></div>

        <div class="player-row" style="margin-top:10px">
          <span class="player-label black-label">Black</span>
          <select id="black-kind" onchange="onPlayerChange('black')">
            <option value="human">Human</option>
            <option value="herringbone">Herringbone</option>
            <option value="astrid">Astrid</option>
          </select>
        </div>
        <div id="black-options" class="player-options" style="display:none"></div>
      </div>

      <div class="btn-row">
        <button id="new-game-btn" onclick="D.newGame()">New Game</button>
        <button id="start-btn" onclick="D.startGame()">Start</button>
      </div>
      <div class="btn-row" style="margin-top:4px">
        <button id="resign-btn" onclick="D.resign()">Resign</button>
        <button id="draw-btn" onclick="D.offerDraw()" title="Offer draw">½</button>
        <button id="abort-btn" onclick="D.abortGame()" title="Abort game">✕</button>
      </div>

      <div class="section" id="status-section">
        <div id="turn-label" class="turn-label"></div>
        <div id="eval-line" class="eval-line"></div>
        <div class="captured-row">
          <span class="cap-side red-label">Red:</span>
          <span id="cap-red" class="cap-pieces"></span>
        </div>
        <div class="captured-row">
          <span class="cap-side black-label">Black:</span>
          <span id="cap-black" class="cap-pieces"></span>
        </div>
      </div>

      <div class="section move-list-section">
        <div class="move-list-header">
          <h3>Moves</h3>
        </div>
        <div class="move-actions-row">
          <button class="move-action-btn" onclick="D.copyMoves()" title="Copy moves to clipboard">Copy</button>
          <button class="move-action-btn" onclick="D.pasteMoves()" title="Paste moves from clipboard">Paste</button>
          <button class="move-action-btn" onclick="D.saveGame()" title="Save game to file">Save</button>
          <button class="move-action-btn" onclick="D.loadGame()" title="Load game from file">Load</button>
        </div>
        <div class="move-list-scroll">
          <table id="move-list"></table>
        </div>
        <div class="move-nav">
          <button class="nav-btn" onclick="D.navTo(0)" title="Start">|&#8249;</button>
          <button class="nav-btn" onclick="D.navBack()" title="Back">&#8249;</button>
          <button class="nav-btn" onclick="D.navForward()" title="Forward">&#8250;</button>
          <button class="nav-btn" onclick="D.navTo(null)" title="End">&#8250;|</button>
        </div>
      </div>

      <div class="section" id="eval-graph-section" style="display:none">
        <svg id="eval-graph" width="192" height="44" style="display:block;width:100%"></svg>
      </div>

      <button id="open-rules-btn" class="rules-open-btn" onclick="D.openRules()">
        <span class="rules-open-icon">&#128214;</span> How to Play
      </button>
      <button id="open-sandbox-btn" class="rules-open-btn" onclick="D.toggleSandbox()">
        <span class="rules-open-icon">&#9858;</span> Experiment
      </button>
    </div>

    <!-- Right panel: board -->
    <div id="board-area">
      <div id="board-wrap">
        <div id="board-coord-wrap">
          <div id="eval-bar-wrap" style="display:none">
            <div id="eval-bar-black"></div>
          </div>
          <div id="coord-nums">
            <span>9</span><span>8</span><span>7</span><span>6</span><span>5</span><span>4</span><span>3</span><span>2</span><span>1</span>
          </div>
          <div id="board-and-letters">
            <div id="board-container"></div>
            <div id="coord-letters">
              <span>A</span><span>B</span><span>C</span><span>D</span><span>E</span><span>F</span><span>G</span><span>H</span><span>I</span>
            </div>
          </div>
        </div>
        <div id="result-banner" style="display:none"></div>

        <div id="board-toolbar">
          <button id="analyse-btn" class="board-tool-btn" onclick="D.toggleAnalysis()" title="Free piece exploration">Analyse</button>
          <button id="attack-map-btn" class="board-tool-btn" onclick="D.toggleAttackMap()" title="Toggle attack map">Attack Map</button>
          <button id="flip-btn" class="board-tool-btn" onclick="D.flipBoard()" title="Flip the board">&#8635; Flip</button>
          <button id="auto-flip-btn" class="board-tool-btn" onclick="D.toggleAutoFlip()" title="Auto-flip after each move (hotseat)">&#8635; Auto</button>
          <button id="mute-btn" class="board-tool-btn" onclick="D.toggleMute()" title="Toggle sound">&#128266; Sound</button>
        </div>
      </div>

      <!-- Experiment / sandbox panel (replaces the board; driven by sandbox.js) -->
      <div id="sandbox-panel" style="display:none">
        <div class="sandbox-inline-head">
          <h2>EXPERIMENT</h2>
          <p class="sandbox-sub">Set up any position, then press Play. Moves follow the real rules.</p>
        </div>
        <div class="sandbox-palette" id="sb-palette-black"></div>
        <div id="sandbox-board"></div>
        <div class="sandbox-palette" id="sb-palette-red"></div>
        <div class="sandbox-toolbar">
          <button id="sb-playpause" class="sb-playpause">&#9654;  Play</button>
          <button id="sb-play-hr" class="sb-play-hr" title="Play the position against Herringbone (5s)">&#9654;  Play vs Herringbone</button>
          <div class="sb-edit-controls">
            <div class="sb-side-row">
              <span class="sb-ctrl-label">First:</span>
              <button id="sb-side-red" class="sb-side-btn">Red</button>
              <button id="sb-side-black" class="sb-side-btn">Black</button>
            </div>
            <button id="sb-clear" class="sb-tool-btn" title="Empty the board">Clear</button>
            <button id="sb-start" class="sb-tool-btn" title="Reset to the starting position">Start pos.</button>
          </div>
          <button id="sb-flip" class="sb-tool-btn" title="Flip the board">&#8635; Flip</button>
        </div>
        <div id="sb-status" class="sandbox-status"></div>
      </div>
    </div>
  </div>

  <!-- Full-screen rules overlay (populated by rules-page.js) -->
  <div id="rules-overlay" class="rules-overlay" style="display:none" onclick="if(event.target===this)D.closeRules()">
    <div id="rules-overlay-modal" class="rules-overlay-modal">
      <button class="rules-overlay-close" onclick="D.closeRules()" title="Close (Esc)">&#10005;</button>
      <div id="rules-overlay-body"></div>
    </div>
  </div>

  <!-- Load order matters: board-state → rules → AI → hud → game → renderer → dispatch -->
  <script src="sound.js"></script>
  <script src="board-state.js"></script>
  <script src="drott-rules.js"></script>
  <script src="herringbone-ai.js"></script>
  <script src="onnx-ai.js"></script>
  <script src="hud.js"></script>
  <script src="game.js"></script>
  <script src="renderer.js"></script>
  <script src="ai-dispatch.js"></script>
  <script src="rules-page.js"></script>
  <script src="sandbox.js"></script>

  <script>
    // Player kind dropdown change handler
    function onPlayerChange(side) {
      const kind = document.getElementById(`${side}-kind`).value;
      const setup = side === 'red' ? D.redSetup : D.blackSetup;
      setup.kind = kind;
      renderPlayerOptions(side, kind);
    }

    async function renderPlayerOptions(side, kind) {
      const el = document.getElementById(`${side}-options`);
      el.innerHTML = '';
      if (kind === 'herringbone') {
        el.style.display = 'block';
        el.innerHTML = `
          <label>Strength
            <select onchange="D.${side}Setup.thinkTime = parseFloat(this.value)">
              <option value="2">Easy (2s)</option>
              <option value="5" selected>Normal (5s)</option>
              <option value="10">Hard (10s)</option>
            </select>
          </label>`;
      } else if (kind === 'astrid') {
        el.style.display = 'block';
        let models = ['astrid_v2', 'astrid_v1', 'astrid_v0'];
        try {
          const { ipcRenderer } = require('electron');
          models = await ipcRenderer.invoke('drott-list-models');
        } catch (_) {}
        const curModel = D[`${side}Setup`].model || 'astrid_v2';
        const opts = models.map(m => {
          const label = m.replace(/^astrid_/, '').replace(/^it(\d+)$/, 'it $1');
          const sel = m === curModel ? ' selected' : '';
          return `<option value="${m}"${sel}>${label}</option>`;
        }).join('');
        el.innerHTML = `
          <label>Model
            <select onchange="D.${side}Setup.model = this.value">
              ${opts}
            </select>
          </label>
          <label style="margin-top:4px">Iterations
            <select onchange="D.${side}Setup.iterations = parseInt(this.value)">
              <option value="50">50</option>
              <option value="100" selected>100</option>
              <option value="200">200</option>
              <option value="400">400</option>
            </select>
          </label>`;
      } else {
        el.style.display = 'none';
      }
    }
  </script>
</body>
</html>
